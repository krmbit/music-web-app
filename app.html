<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0c0e; --surface: #18181c; --card: #1e1e24; --card-hover: #26262e;
  --border: rgba(255,255,255,0.07); --text: #f5f5f7; --text-2: #8e8e99;
  --text-3: #5a5a6a; --accent: #fa2d55; --player-h: 88px; --sidebar-w: 220px;
  --radius: 14px; --font: 'Figtree', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;display:grid;grid-template-columns:var(--sidebar-w) 1fr;grid-template-rows:1fr var(--player-h);overflow:hidden;user-select:none}

/* LANDING */
.landing{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;z-index:1000;transition:opacity 0.5s,transform 0.5s}
.landing.hidden{opacity:0;transform:scale(0.96);pointer-events:none}
.landing-logo{font-size:64px;color:var(--accent)}
.landing h1{font-size:32px;font-weight:800;letter-spacing:-0.5px}
.landing p{font-size:15px;color:var(--text-2);text-align:center;max-width:360px;line-height:1.6}
.open-btn{background:var(--accent);color:#fff;border:none;border-radius:14px;padding:15px 32px;font-family:var(--font);font-size:16px;font-weight:700;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;box-shadow:0 8px 32px rgba(250,45,85,0.35)}
.open-btn:hover{transform:scale(1.04) translateY(-1px);box-shadow:0 12px 40px rgba(250,45,85,0.45)}
.open-btn:active{transform:scale(0.97)}
.landing-note{font-size:12px;color:var(--text-3);text-align:center}

/* PROGRESS OVERLAY */
.scan-overlay{position:fixed;inset:0;background:rgba(12,12,14,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;z-index:999;transition:opacity 0.4s}
.scan-overlay.hidden{opacity:0;pointer-events:none}
.scan-title{font-size:18px;font-weight:700}
.scan-sub{font-size:14px;color:var(--text-2)}
.scan-bar-wrap{width:320px;height:4px;background:var(--surface);border-radius:4px;overflow:hidden}
.scan-bar{height:100%;background:var(--accent);border-radius:4px;width:0%;transition:width 0.3s}

/* SIDEBAR */
.sidebar{grid-row:1;background:rgba(10,10,14,0.95);border-right:1px solid var(--border);display:flex;flex-direction:column;padding:24px 16px 16px;gap:6px;overflow-y:auto}
.sidebar-logo{display:flex;align-items:center;gap:10px;padding:0 8px 20px;font-size:18px;font-weight:700;color:var(--text)}
.sidebar-logo svg{color:var(--accent);flex-shrink:0}
.nav-section{font-size:10px;font-weight:700;letter-spacing:0.1em;color:var(--text-3);text-transform:uppercase;padding:14px 8px 6px}
.nav-section-header{display:flex;align-items:center;justify-content:space-between;}
.add-pl-btn{background:none;border:none;color:var(--text-3);cursor:pointer;font-size:16px;font-weight:700;padding-right:8px;transition:color 0.12s;}
.add-pl-btn:hover{color:var(--accent);}
.nav-btn{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:9px;cursor:pointer;font-size:14px;font-weight:500;color:var(--text-2);transition:all 0.15s;border:none;background:none;width:100%;text-align:left}
.nav-btn:hover{background:var(--surface);color:var(--text)}
.nav-btn.active{background:var(--accent);color:#fff}
.nav-btn svg{width:16px;height:16px;flex-shrink:0}
.playlist-item-wrapper{position:relative;display:flex;align-items:center;width:100%;}
.playlist-item-wrapper .nav-btn{padding-right:32px;}
.playlist-del-btn{position:absolute;right:10px;background:none;border:none;color:var(--text-3);cursor:pointer;display:none;font-size:14px;transition:color 0.12s;}
.playlist-item-wrapper:hover .playlist-del-btn{display:block;}
.playlist-del-btn:hover{color:var(--accent);}

/* MAIN */
.main{grid-column:2;grid-row:1;display:flex;flex-direction:column;overflow:hidden;position:relative}
.bg-blob{position:absolute;top:-100px;right:-100px;width:500px;height:500px;border-radius:50%;pointer-events:none;filter:blur(40px);transition:background 2s ease;z-index:0}
.header{padding:28px 32px 20px;display:flex;align-items:center;gap:16px;flex-shrink:0;position:relative;z-index:1}
.search-wrap{flex:1;max-width:380px;position:relative}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--text-3);width:16px;height:16px}
#search{width:100%;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 14px 9px 36px;color:var(--text);font-family:var(--font);font-size:14px;outline:none;transition:border-color 0.2s}
#search:focus{border-color:var(--accent)}
#search::placeholder{color:var(--text-3)}
.header-right{display:flex;align-items:center;gap:10px;margin-left:auto}
.track-count{font-size:13px;color:var(--text-3);font-weight:500}
.view-toggle {display:flex;gap:2px;background:var(--surface);padding:3px;border-radius:9px;border:1px solid var(--border)}
.view-btn{background:none;border:none;color:var(--text-3);padding:5px 8px;border-radius:6px;cursor:pointer;display:flex;transition:all 0.12s}
.view-btn.active{background:var(--card);color:var(--text)}
.view-btn:hover:not(.active){color:var(--text-2)}

/* LIBRARY */
.library{flex:1;overflow-y:auto;padding:0 32px 20px;position:relative;z-index:1}
.library::-webkit-scrollbar{width:4px}
.library::-webkit-scrollbar-thumb{background:var(--text-3);border-radius:4px}
#song-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:16px;padding:8px 0}
#song-list{display:none;flex-direction:column;gap:2px}

/* SONG CARD */
.song-card{background:var(--card);border-radius:var(--radius);overflow:hidden;cursor:pointer;transition:transform 0.18s cubic-bezier(.34,1.56,.64,1),box-shadow 0.18s;position:relative;border:1px solid var(--border)}
.song-card:hover{transform:scale(1.04) translateY(-2px);box-shadow:0 16px 40px rgba(0,0,0,0.5);border-color:rgba(255,255,255,0.12)}
.song-card.playing{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 12px 32px rgba(250,45,85,0.25)}
.card-art-wrap{position:relative;aspect-ratio:1;background:var(--surface);overflow:hidden}
.card-art{width:100%;height:100%;object-fit:cover;display:block}
.card-art-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#1e1e28,#2a1a2e);color:var(--text-3)}
.play-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.4);display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity 0.18s}
.song-card:hover .play-overlay{opacity:1}
.play-overlay-btn{width:44px;height:44px;background:rgba(255,255,255,0.95);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#000;box-shadow:0 4px 16px rgba(0,0,0,0.4)}
.playing-indicator{position:absolute;top:8px;right:8px;display:none;gap:2px;align-items:flex-end;height:16px}
.song-card.playing .playing-indicator{display:flex}
.bar{width:3px;background:var(--accent);border-radius:2px;animation:bounce 0.8s ease infinite alternate}
.bar:nth-child(1){height:8px;animation-delay:0s}
.bar:nth-child(2){height:14px;animation-delay:0.2s}
.bar:nth-child(3){height:10px;animation-delay:0.4s}
@keyframes bounce{from{transform:scaleY(0.4)}to{transform:scaleY(1)}}
.card-info{padding:11px 12px 13px}
.card-title{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:3px}
.card-artist{font-size:12px;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.card-more-btn{position:absolute;top:8px;left:8px;background:rgba(0,0,0,0.6);border:none;color:#fff;width:26px;height:26px;border-radius:50%;cursor:pointer;display:none;align-items:center;justify-content:center;font-size:12px;z-index:10;backdrop-filter:blur(4px);}
.song-card:hover .card-more-btn{display:flex;}
.card-more-btn:hover{background:var(--accent);}

/* LIST VIEW */
.list-header{display:grid;grid-template-columns:36px 44px 1fr 1fr 60px 40px;gap:12px;padding:6px 10px;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-3);border-bottom:1px solid var(--border);margin-bottom:4px}
.list-item{display:grid;grid-template-columns:36px 44px 1fr 1fr 60px 40px;align-items:center;gap:12px;padding:7px 10px;border-radius:9px;cursor:pointer;transition:background 0.12s}
.list-item:hover{background:var(--surface)}
.list-item.playing{background:rgba(250,45,85,0.1)}
.list-item.playing .li-title{color:var(--accent)}
.li-num{font-size:13px;color:var(--text-3);text-align:center}
.list-item.playing .li-num{color:var(--accent)}
.li-art{width:40px;height:40px;border-radius:6px;object-fit:cover;background:var(--card);flex-shrink:0}
.li-info{overflow:hidden}
.li-title{font-size:14px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-artist{font-size:12px;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-album{font-size:12px;color:var(--text-3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.li-duration{font-size:12px;color:var(--text-3);text-align:right;font-variant-numeric:tabular-nums}
.list-more-btn{background:none;border:none;color:var(--text-3);cursor:pointer;display:none;font-size:14px;text-align:center;}
.list-item:hover .list-more-btn{display:inline-block;}
.list-more-btn:hover{color:var(--text);}

/* CONTEXT DROPDOWN MENU */
.playlist-dropdown{position:absolute;background:var(--card);border:1px solid var(--border);border-radius:8px;z-index:2000;box-shadow:0 10px 30px rgba(0,0,0,0.5);min-width:160px;padding:4px 0;font-size:13px;}
.playlist-dropdown-header{padding:6px 12px;font-size:11px;font-weight:700;color:var(--text-3);text-transform:uppercase;border-bottom:1px solid var(--border);margin-bottom:4px;}
.playlist-dropdown-item{padding:8px 12px;cursor:pointer;color:var(--text-2);transition:background 0.12s, color 0.12s;}
.playlist-dropdown-item:hover{background:var(--surface);color:var(--text);}

/* LOADING / EMPTY */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 0;gap:16px;color:var(--text-2)}
.loading-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.empty{display:flex;flex-direction:column;align-items:center;padding:60px 20px;gap:12px;color:var(--text-3);text-align:center}
.empty h3{font-size:18px;font-weight:700;color:var(--text-2)}

/* PLAYER BAR */
.player{grid-column:1 / -1;grid-row:2;background:rgba(14,14,18,0.97);backdrop-filter:blur(30px);border-top:1px solid var(--border);display:grid;grid-template-columns:280px 1fr 280px;align-items:center;padding:0 20px;gap:20px}
.now-playing{display:flex;align-items:center;gap:12px;min-width:0}
#np-art{width:52px;height:52px;border-radius:8px;object-fit:cover;flex-shrink:0;background:var(--surface);box-shadow:0 4px 16px rgba(0,0,0,0.4)}
.np-text{min-width:0}
#np-title{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#np-artist{font-size:12px;color:var(--text-2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.np-love{background:none;border:none;color:var(--text-3);cursor:pointer;padding:6px;border-radius:6px;transition:color 0.15s,transform 0.15s;flex-shrink:0}
.np-love:hover{color:var(--accent);transform:scale(1.15)}
.np-love.loved{color:var(--accent)}
.controls{display:flex;flex-direction:column;align-items:center;gap:8px}
.ctrl-btns{display:flex;align-items:center;gap:4px}
.ctrl-btn{background:none;border:none;color:var(--text-2);cursor:pointer;padding:8px;border-radius:8px;transition:color 0.12s,transform 0.12s,background 0.12s;display:flex;align-items:center;justify-content:center}
.ctrl-btn:hover{color:var(--text);background:var(--surface)}
.ctrl-btn:active{transform:scale(0.92)}
.ctrl-btn.play-pause{width:44px;height:44px;background:var(--text);color:var(--bg);border-radius:50%;margin:0 4px}
.ctrl-btn.play-pause:hover{background:var(--text);color:var(--bg);transform:scale(1.06)}
.ctrl-btn.secondary{color:var(--text-3)}
.ctrl-btn.secondary:hover{color:var(--text-2)}
.ctrl-btn.active{color:var(--accent)}
.progress-row{display:flex;align-items:center;gap:10px;width:100%;max-width:500px}
.time-label{font-size:11px;color:var(--text-3);font-variant-numeric:tabular-nums;width:36px;flex-shrink:0}
.time-label.right{text-align:right}
.progress-bar{flex:1;height:4px;background:var(--surface);border-radius:4px;position:relative;cursor:pointer;transition:height 0.15s}
.progress-bar:hover{height:6px}
.progress-fill{height:100%;background:var(--text);border-radius:4px;position:relative;pointer-events:none;transition:background 0.3s}
.progress-bar:hover .progress-fill{background:var(--accent)}
.progress-thumb{position:absolute;right:-6px;top:50%;transform:translateY(-50%);width:12px;height:12px;background:var(--text);border-radius:50%;opacity:0;pointer-events:none;transition:opacity 0.15s}
.progress-bar:hover .progress-thumb{opacity:1}
.right-controls{display:flex;align-items:center;gap:4px;justify-content:flex-end}
.volume-wrap{display:flex;align-items:center;gap:6px}
.volume-wrap svg{color:var(--text-2);width:16px;height:16px;flex-shrink:0}
input[type=range]{-webkit-appearance:none;appearance:none;background:transparent;cursor:pointer}
input[type=range]::-webkit-slider-runnable-track{height:3px;background:var(--surface);border-radius:3px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;border-radius:50%;background:var(--text);margin-top:-4.5px;transition:transform 0.12s}
input[type=range]:hover::-webkit-slider-thumb{transform:scale(1.2)}
#volume{width:80px}
.speed-btn{background:var(--surface);border:1px solid var(--border);color:var(--text-2);border-radius:7px;padding:4px 9px;font-family:var(--font);font-size:12px;font-weight:600;cursor:pointer;transition:all 0.12s}
.speed-btn:hover{color:var(--text);border-color:var(--text-3)}
.right-btn{background:none;border:none;color:var(--text-3);cursor:pointer;padding:7px;border-radius:7px;display:flex;transition:color 0.12s,background 0.12s}
.right-btn:hover{color:var(--text);background:var(--surface)}
.right-btn.active{color:var(--accent)}

/* IMMERSIVE APPLE MUSIC LYRICS VIEW */
.immersive-view{position:fixed;inset:0;z-index:1500;background:#000;display:flex;align-items:center;justify-content:center;color:#fff;overflow:hidden;font-family:var(--font);transition:opacity 0.4s ease;}
.imm-bg{position:absolute;inset:-10%;width:120%;height:120%;background-size:cover;background-position:center;filter:blur(70px) brightness(0.5) contrast(1.15);transform:scale(1.1);z-index:0;transition:background-image 0.8s cubic-bezier(0.25, 1, 0.5, 1);}
.imm-bg::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg, rgba(12,12,16,0.3), rgba(12,12,16,0.5));}
.imm-close-btn{position:absolute;top:28px;right:28px;z-index:10;background:rgba(255,255,255,0.08);border:none;color:rgba(255,255,255,0.6);width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.05);}
.imm-close-btn:hover{background:rgba(255,255,255,0.18);color:#fff;transform:scale(1.05);}
.imm-container{position:relative;z-index:2;width:100%;max-width:1150px;height:82vh;display:grid;grid-template-columns:420px 1fr;gap:80px;padding:0 40px;align-items:center;}
.imm-left{display:flex;flex-direction:column;align-items:flex-start;width:100%;}
#imm-art{width:360px;height:360px;object-fit:cover;border-radius:12px;box-shadow:0 24px 60px rgba(0,0,0,0.65);margin-bottom:32px;background:var(--surface);}
.imm-meta{width:360px;margin-bottom:20px;}
#imm-title{font-size:22px;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-0.3px;}
#imm-artist{font-size:15px;color:rgba(255,255,255,0.55);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:4px;}
.imm-progress-row{display:flex;align-items:center;gap:12px;width:360px;margin-bottom:24px;}
.imm-time{font-size:12px;color:rgba(255,255,255,0.4);font-variant-numeric:tabular-nums;width:40px;}
.imm-progress-bar{flex:1;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;position:relative;cursor:pointer;}
.imm-progress-fill{height:100%;background:#fff;border-radius:2px;width:0%;}
.imm-controls{display:flex;align-items:center;gap:20px;width:360px;justify-content:center;}
.imm-controls .ctrl-btn{color:rgba(255,255,255,0.65);padding:10px;border-radius:50%;}
.imm-controls .ctrl-btn:hover{color:#fff;background:rgba(255,255,255,0.1);}
.imm-controls .imm-play-btn{width:46px;height:46px;background:#fff;color:#000;border-radius:50%;display:flex;align-items:center;justify-content:center;}
.imm-controls .imm-play-btn:hover{background:#fff;color:#000;transform:scale(1.06);}
.imm-right{height:100%;overflow-y:auto;display:flex;flex-direction:column;mask-image:linear-gradient(to bottom, transparent 0%, #000 15%, #000 85%, transparent 100%);-webkit-mask-image:linear-gradient(to bottom, transparent 0%, #000 15%, #000 85%, transparent 100%);padding:140px 0;}
.imm-right::-webkit-scrollbar{display:none;}
#imm-lyrics-scroll{display:flex;flex-direction:column;gap:24px;}
.imm-lyric-line{font-size:28px;font-weight:700;line-height:1.4;color:rgba(255,255,255,0.25);cursor:pointer;transition:all 0.35s cubic-bezier(0.25, 1, 0.5, 1);transform-origin:left center;max-width:95%;letter-spacing:-0.5px;}
.imm-lyric-line:hover{color:rgba(255,255,255,0.55);}
.imm-lyric-line.active{color:#fff;font-size:35px;transform:scale(1.01);text-shadow:0 4px 24px rgba(0,0,0,0.25);}
.hidden{display:none !important;}
</style>
</head>
<body>

<div class="landing" id="landing">
  <svg width="72" height="72" viewBox="0 0 24 24" fill="#fa2d55">
    <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
  </svg>
  <h1>Music</h1>
  <p>Open your Apple Music folder and your full library loads right in the browser — no server needed.</p>
  <button class="open-btn" onclick="openFolder()">Open Music Folder</button>
  <p class="landing-note">Chrome / Edge only · Your music never leaves your device</p>
</div>

<div class="scan-overlay hidden" id="scan-overlay">
  <div class="loading-spinner"></div>
  <div class="scan-title" id="scan-title">Scanning library…</div>
  <div class="scan-sub" id="scan-sub">Finding your songs</div>
  <div class="scan-bar-wrap"><div class="scan-bar" id="scan-bar"></div></div>
</div>

<aside class="sidebar">
  <div class="sidebar-logo">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
    </svg>
    Music
  </div>
  
  <div class="nav-section">Library</div>
  <button class="nav-btn active" onclick="setNavActive(this)" data-filter="all">
    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>
    Songs
  </button>
  <button class="nav-btn" onclick="setNavActive(this)" data-filter="loved">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>
    Loved
  </button>
  
  <div class="nav-section-header">
    <div class="nav-section">Playlists</div>
    <button class="add-pl-btn" onclick="createPlaylist()" title="Create Playlist">+</button>
  </div>
  <div id="sidebar-playlists"></div>
  
  <div style="flex:1"></div>
  <button class="nav-btn" onclick="openFolder()">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>
    Change Folder
  </button>
</aside>

<main class="main">
  <div class="bg-blob" id="bg-blob"></div>
  <div class="header">
    <div class="search-wrap">

          <svg id="imm-pause-icon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
        </button>
        <button class="ctrl-btn" onclick="nextSong()" title="Next"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg></button>

<audio id="audio" preload="none"></audio>

<script>
const audio = document.getElementById('audio');
let songs = [];        // full library
let queue = [];        // playback queue
let queueIndex = -1;
let currentView = 'grid';
let shuffle = false;
let repeat = 'none';
let loved = new Set(JSON.parse(localStorage.getItem('loved') || '[]'));
let playlists = JSON.parse(localStorage.getItem('playlists') || '{}');
let activeFilter = 'all';
let lyricsOpen = false;
let lyrics = [];
let currentLyricIdx = -1;
let currentAudioUrl = null;
let activeMenuSongId = null;
const speeds = [0.5, 0.75, 1, 1.25, 1.5, 2];
let speedIdx = 2;

// ── FOLDER PICKER ──────────────────────────────────────────────────────────
async function openFolder() {
  if (!('showDirectoryPicker' in window)) {
    alert('Please use Chrome or Edge to use this app.');
    return;
  }
  let dirHandle;
  try {
    dirHandle = await window.showDirectoryPicker({ mode: 'read' });
  } catch(e) { return; } // user cancelled

  document.getElementById('landing').classList.add('hidden');
  showScanOverlay('Scanning folder…', 'Finding your songs…');

  const fileHandles = [];
  const lrcMap = {};
  await collectFilesEnhanced(dirHandle, fileHandles, lrcMap);

  const total = fileHandles.length;
  if (!total) {
    hideScanOverlay();
    document.getElementById('song-grid').innerHTML = `<div class="empty"><h3>No songs found</h3><p>Make sure you picked the right folder</p></div>`;
    return;
  }

  songs = [];
  document.getElementById('song-grid').innerHTML = '';
  document.getElementById('track-count').textContent = `Scanning…`;

  // Parse metadata in batches of 8
  const BATCH = 8;
  for (let i = 0; i < fileHandles.length; i += BATCH) {
    const batch = fileHandles.slice(i, i + BATCH);
    const pct = Math.round((i / total) * 100);
    document.getElementById('scan-bar').style.width = pct + '%';
    document.getElementById('scan-sub').textContent = `${i} / ${total} songs`;
    
    await Promise.all(batch.map(async h => {
      await parseSong(h);
      const base = h.name.replace(/\.[^.]+$/, '');
      if (lrcMap[base]) {
        try {
          const lrcFile = await lrcMap[base].getFile();
          const text = await lrcFile.text();
          const song = songs.find(s => s.handle === h);
          if (song) song._lrcContent = text;
        } catch(e) {}
      }
    }));

    songs.sort((a,b) => a.title.localeCompare(b.title));
    renderLibrary();
    document.getElementById('track-count').textContent = `${songs.length} songs`;
    await sleep(0);
  }

  queue = [...songs];
  hideScanOverlay();
  document.getElementById('track-count').textContent = `${songs.length} songs`;
}

async function collectFilesEnhanced(dirHandle, audioOut, lrcMap) {
  for await (const [name, handle] of dirHandle.entries()) {
    if (handle.kind === 'directory') {
      await collectFilesEnhanced(handle, audioOut, lrcMap);
    } else {
      const ext = name.split('.').pop().toLowerCase();
      if (['m4a','mp3','flac','aac','ogg'].includes(ext)) {
        audioOut.push(handle);
      } else if (ext === 'lrc') {
        const base = name.replace(/\.lrc$/i, '');
        lrcMap[base] = handle;
      }
    }
  }
}

async function parseSong(handle) {
  try {
    const file = await handle.getFile();
    return new Promise(resolve => {
      jsmediatags.read(file, {
        onSuccess(tag) {
          const t = tag.tags;
          const id = handle.name + '_' + file.size;
          let artUrl = null;
          if (t.picture) {
            const { data, format } = t.picture;
            const bytes = new Uint8Array(data);
            const blob = new Blob([bytes], { type: format });
            artUrl = URL.createObjectURL(blob);
          }
          songs.push({
            id,
            title:    t.title   || stripExt(handle.name),
            artist:   t.artist  || 'Unknown Artist',
            album:    t.album   || 'Unknown Album',
            track:    t.track   || 0,
            duration: file.size ? 0 : 0,
            artUrl,
            handle,
            lrcHandle: null,
          });
          resolve();
        },
        onError() {
          songs.push({
            id: handle.name + '_' + file.size,
            title: stripExt(handle.name),
            artist: 'Unknown Artist',
            album: 'Unknown Album',
            track: 0, duration: 0,
            artUrl: null, handle, lrcHandle: null,
          });
          resolve();
        }
      });
    });
  } catch(e) {}
}

function stripExt(name) { return name.replace(/\.[^.]+$/, ''); }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function showScanOverlay(title, sub) {
  document.getElementById('scan-title').textContent = title;
  document.getElementById('scan-sub').textContent = sub;
  document.getElementById('scan-bar').style.width = '0%';
  document.getElementById('scan-overlay').classList.remove('hidden');
}

function hideScanOverlay() {
  document.getElementById('scan-overlay').classList.add('hidden');
}

// ── PLAYLIST CORE ACTIONS ──────────────────────────────────────────────────
function renderSidebarPlaylists() {
  const container = document.getElementById('sidebar-playlists');
  if (!container) return;
  
  let html = '';
  for (const plName in playlists) {
    const isActive = (activeFilter === `playlist:${plName}`) ? 'active' : '';
    html += `
      <div class="playlist-item-wrapper">
        <button class="nav-btn ${isActive}" onclick="setPlaylistActive('${esc(plName)}')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/></svg>
          ${esc(plName)}
        </button>
        <button class="playlist-del-btn" onclick="deletePlaylist('${esc(plName)}', event)" title="Delete Playlist">✕</button>
      </div>
    `;
  }
  container.innerHTML = html;
}

function createPlaylist() {
  const name = prompt("Enter a name for your new playlist:");
  if (!name || !name.trim()) return;
  const cleanedName = name.trim();
  if (playlists[cleanedName]) {
    alert("A playlist with that name already exists!");
    return;
  }
  playlists[cleanedName] = [];
  localStorage.setItem('playlists', JSON.stringify(playlists));
  renderSidebarPlaylists();
}

function deletePlaylist(name, event) {
  event.stopPropagation();
  if (!confirm(`Are you sure you want to delete the playlist "${name}"?`)) return;
  delete playlists[name];
  localStorage.setItem('playlists', JSON.stringify(playlists));
  if (activeFilter === `playlist:${name}`) {
    activeFilter = 'all';
    document.querySelector('[data-filter="all"]')?.classList.add('active');
  }
  renderSidebarPlaylists();
  renderLibrary();
}

function setPlaylistActive(name) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  activeFilter = `playlist:${name}`;
  renderLibrary();
  renderSidebarPlaylists();
}

function showPlaylistMenu(e, songId) {
  e.stopPropagation();
  activeMenuSongId = songId;
  const menu = document.getElementById('playlist-dropdown');
  
  let playlistItems = '';
  const keys = Object.keys(playlists);
  if (keys.length === 0) {
    playlistItems = `<div class="playlist-dropdown-item" style="color:var(--text-3); cursor:default;">No custom playlists</div>`;
  } else {
    playlistItems = keys.map(k => `
      <div class="playlist-dropdown-item" onclick="addSongToPlaylist('${esc(k)}')">Add to: ${esc(k)}</div>
    `).join('');
  }
  
  menu.innerHTML = `<div class="playlist-dropdown-header">Playlist Options</div>${playlistItems}`;
  menu.classList.remove('hidden');
  
  const rect = e.currentTarget.getBoundingClientRect();
  menu.style.left = `${window.scrollX + rect.left - 130}px`;
  menu.style.top = `${window.scrollY + rect.bottom + 6}px`;
  
  setTimeout(() => {
    document.addEventListener('click', closePlaylistMenu, { once: true });
  }, 0);
}

function closePlaylistMenu() {
  document.getElementById('playlist-dropdown').classList.add('hidden');
}

function addSongToPlaylist(plName) {
  if (!activeMenuSongId) return;
  if (!playlists[plName].includes(activeMenuSongId)) {
    playlists[plName].push(activeMenuSongId);
    localStorage.setItem('playlists', JSON.stringify(playlists));
  }
  closePlaylistMenu();
}

// ── RENDER LIBRARY ─────────────────────────────────────────────────────────
function filteredSongs() {
  const q = document.getElementById('search').value.toLowerCase();
  let list = [];
  
  if (activeFilter === 'loved') {
    list = songs.filter(s => loved.has(s.id));
  } else if (activeFilter.startsWith('playlist:')) {
    const plName = activeFilter.replace('playlist:', '');
    const targetIds = playlists[plName] || [];
    list = songs.filter(s => targetIds.includes(s.id));
  } else {
    list = [...songs];
  }
  
  if (q) list = list.filter(s =>
    s.title.toLowerCase().includes(q) ||
    s.artist.toLowerCase().includes(q) ||
    s.album.toLowerCase().includes(q));
  return list;
}

function renderLibrary() {
  const list = filteredSongs();
  if (currentView === 'grid') renderGrid(list);
  else renderList(list);
}

function musicNote() {
  return `<svg width="36" height="36" viewBox="0 0 24 24" fill="currentColor"><path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/></svg>`;
}

function renderGrid(list) {
  document.getElementById('song-grid').style.display = 'grid';
  document.getElementById('song-list').style.display = 'none';
  const cur = currentSong();
  if (!list.length) {
    document.getElementById('song-grid').innerHTML = `<div class="empty">${musicNote()}<h3>No songs</h3><p>Try a different search</p></div>`;
    return;
  }
  document.getElementById('song-grid').innerHTML = list.map(s => `
    <div class="song-card ${cur?.id === s.id ? 'playing' : ''}" id="card-${s.id}" onclick="playSong('${s.id}')">
      <button class="card-more-btn" onclick="showPlaylistMenu(event, '${s.id}')">•••</button>
      <div class="card-art-wrap">
        ${s.artUrl
          ? `<img class="card-art" src="${s.artUrl}" alt="" loading="lazy">`
          : `<div class="card-art-placeholder">${musicNote()}</div>`}
        <div class="play-overlay"><div class="play-overlay-btn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        </div></div>
        <div class="playing-indicator"><div class="bar"></div><div class="bar"></div><div class="bar"></div></div>
      </div>
      <div class="card-info">
        <div class="card-title">${esc(s.title)}</div>
        <div class="card-artist">${esc(s.artist)}</div>
      </div>
    </div>`).join('');
}

function renderList(list) {
  document.getElementById('song-grid').style.display = 'none';
  document.getElementById('song-list').style.display = 'flex';
  const cur = currentSong();
  if (!list.length) { document.getElementById('song-list').innerHTML = `<div class="empty"><h3>No songs</h3></div>`; return; }
  document.getElementById('song-list').innerHTML = `
    <div class="list-header"><span>#</span><span></span><span>Title</span><span>Album</span><span>Time</span><span></span></div>
    ${list.map((s,i) => `
    <div class="list-item ${cur?.id === s.id ? 'playing' : ''}" id="li-${s.id}" onclick="playSong('${s.id}')">
      <span class="li-num">${i+1}</span>
      ${s.artUrl ? `<img class="li-art" src="${s.artUrl}" alt="" loading="lazy">` : `<div class="li-art"></div>`}
      <div class="li-info"><div class="li-title">${esc(s.title)}</div><div class="li-artist">${esc(s.artist)}</div></div>
      <div class="li-album">${esc(s.album)}</div>
      <div class="li-duration" id="dur-${s.id}">${s.duration ? fmt(s.duration) : '—'}</div>
      <button class="list-more-btn" onclick="showPlaylistMenu(event, '${s.id}')">•••</button>
    </div>`).join('')}`;
}

function setView(v) {
  currentView = v;
  document.getElementById('grid-btn').classList.toggle('active', v === 'grid');
  document.getElementById('list-btn').classList.toggle('active', v === 'list');
  renderLibrary();
}

function setNavActive(btn) {
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  activeFilter = btn.dataset.filter;
  renderLibrary();
  renderSidebarPlaylists();
}

// ── PLAYBACK ───────────────────────────────────────────────────────────────
function currentSong() { return queue[queueIndex] ?? null; }

async function playSong(id) {
  queue = shuffle ? shuffled(filteredSongs()) : filteredSongs();
  queueIndex = queue.findIndex(s => s.id === id);
  if (queueIndex === -1) { queue = filteredSongs(); queueIndex = queue.findIndex(s => s.id === id); }
  await loadAndPlay();
}

async function loadAndPlay() {
  const song = currentSong();
  if (!song) return;

  if (currentAudioUrl) URL.revokeObjectURL(currentAudioUrl);
  const file = await song.handle.getFile();
  currentAudioUrl = URL.createObjectURL(file);
  audio.src = currentAudioUrl;

  // Global UI Setup
  document.getElementById('np-title').textContent = song.title;
  document.getElementById('np-artist').textContent = song.artist;
  document.title = `${song.title} — ${song.artist}`;

  // Full Screen Dashboard Sync
  document.getElementById('imm-title').textContent = song.title;
  document.getElementById('imm-artist').textContent = `${song.artist} — ${song.album}`;

  const npArt = document.getElementById('np-art');
  const immArt = document.getElementById('imm-art');
  const immBg = document.getElementById('imm-bg');

  if (song.artUrl) {
    npArt.src = song.artUrl;
    npArt.style.opacity = '1';
    immArt.src = song.artUrl;
    immArt.style.display = 'block';
    immBg.style.backgroundImage = `url('${song.artUrl}')`;
    extractColor(npArt);
  } else {
    npArt.src = '';
    npArt.style.opacity = '0';
    immArt.src = '';
    immArt.style.display = 'none';
    immBg.style.backgroundImage = 'none';
    document.getElementById('bg-blob').style.background = '';
  }

  document.getElementById('love-btn').classList.toggle('loved', loved.has(song.id));

  document.querySelectorAll('.song-card,.list-item').forEach(el => el.classList.remove('playing'));
  document.getElementById(`card-${song.id}`)?.classList.add('playing');
  document.getElementById(`li-${song.id}`)?.classList.add('playing');

  await audio.play().catch(()=>{});
  updatePlayBtn(true);

  lyrics = [];
  await loadLyrics(song);
}

function togglePlay() {
  if (!currentSong()) {
    if (songs.length) playSong(songs[0].id);
    return;
  }
  if (audio.paused) { audio.play(); updatePlayBtn(true); }
  else { audio.pause(); updatePlayBtn(false); }
}

function updatePlayBtn(playing) {
  document.getElementById('play-icon').style.display = playing ? 'none' : '';
  document.getElementById('pause-icon').style.display = playing ? '' : 'none';
  
  const immPlay = document.getElementById('imm-play-icon');
  const immPause = document.getElementById('imm-pause-icon');
  if (immPlay && immPause) {
    immPlay.style.display = playing ? 'none' : '';
    immPause.style.display = playing ? '' : 'none';
  }
}

function skip(s) { audio.currentTime = Math.max(0, Math.min(audio.duration||0, audio.currentTime+s)); }
function prevSong() {
  if (audio.currentTime > 3) { audio.currentTime = 0; return; }
  queueIndex = (queueIndex - 1 + queue.length) % queue.length;
  loadAndPlay();
}
function nextSong() {
  queueIndex = (queueIndex + 1) % queue.length;
  loadAndPlay();
}
function toggleShuffle() {
  shuffle = !shuffle;
  document.getElementById('shuffle-btn').classList.toggle('active', shuffle);
}
function toggleRepeat() {
  const s = ['none','all','one'];
  repeat = s[(s.indexOf(repeat)+1)%s.length];
  document.getElementById('repeat-btn').classList.toggle('active', repeat !== 'none');
}
function cycleSpeed() {
  speedIdx = (speedIdx+1)%speeds.length;
  audio.playbackRate = speeds[speedIdx];
  document.getElementById('speed-label').textContent = speeds[speedIdx]+'×';
}
function toggleLove() {
  const song = currentSong();
  if (!song) return;
  if (loved.has(song.id)) loved.delete(song.id);
  else loved.add(song.id);
  localStorage.setItem('loved', JSON.stringify([...loved]));
  document.getElementById('love-btn').classList.toggle('loved', loved.has(song.id));
}
function shuffled(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// ── PROGRESS SYNC ─────────────────────────────────────────────────────────
function seekTo(e) {
  if (!audio.duration) return;
  const bar = e.currentTarget;
  const rect = bar.getBoundingClientRect();
  audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
}
audio.addEventListener('timeupdate', () => {
  if (!audio.duration) return;
  const pct = (audio.currentTime/audio.duration)*100;
  
  document.getElementById('progress-fill').style.width = pct+'%';
  document.getElementById('current-time').textContent = fmt(audio.currentTime);
  
  const immProgressFill = document.getElementById('imm-progress-fill');
  const immCurrentTime = document.getElementById('imm-current-time');
  if (immProgressFill) immProgressFill.style.width = pct+'%';
  if (immCurrentTime) immCurrentTime.textContent = fmt(audio.currentTime);
  
  syncLyrics();
});
audio.addEventListener('loadedmetadata', () => {
  const totalDurationStr = fmt(audio.duration);
  document.getElementById('total-time').textContent = totalDurationStr;
  
  const immTotalTime = document.getElementById('imm-total-time');
  if (immTotalTime) immTotalTime.textContent = totalDurationStr;
  
  const s = currentSong();
  if (s) { s.duration = audio.duration; const el = document.getElementById('dur-'+s.id); if(el) el.textContent = fmt(audio.duration); }
});
audio.addEventListener('ended', () => {
  updatePlayBtn(false);
  if (repeat === 'one') { audio.currentTime=0; audio.play(); return; }
  if (repeat === 'none' && queueIndex >= queue.length-1) return;
  nextSong();
});
audio.addEventListener('play', ()=>updatePlayBtn(true));
audio.addEventListener('pause', ()=>updatePlayBtn(false));

// ── LYRICS ENGINE ──────────────────────────────────────────────────────────
async function loadLyrics(song) {
  lyrics = []; currentLyricIdx = -1;
  const immScroll = document.getElementById('imm-lyrics-scroll');
  immScroll.innerHTML = `<div style="opacity: 0.5; padding: 20px; font-weight:500;">Loading lyrics…</div>`;

  try {
    if (song._lrcContent) {
      lyrics = parseLrc(song._lrcContent);
    }
  } catch(e) {}

  if (!lyrics.length) {
    immScroll.innerHTML = `<div class="imm-lyric-line" style="cursor:default; opacity:0.3;">No lyrics available</div>`;
    return;
  }
  
  immScroll.innerHTML = lyrics.map((l,i) =>
    `<div class="imm-lyric-line" id="imm-lyric-${i}" onclick="audio.currentTime=${l.time}">${esc(l.text)}</div>`
  ).join('');
}

function parseLrc(text) {
  const lines = [];
  for (const raw of text.split('\n')) {
    const m = raw.match(/\[(\d+):(\d+\.?\d*)\](.*)/);
    if (!m) continue;
    const time = parseInt(m[1])*60 + parseFloat(m[2]);
    const txt = m[3].trim();
    if (txt) lines.push({ time, text: txt });
  }
  return lines;
}

function syncLyrics() {
  if (!lyrics.length) return;
  const t = audio.currentTime;
  let idx = -1;
  for (let i = 0; i < lyrics.length; i++) {
    if (lyrics[i].time <= t) idx = i; else break;
  }
  if (idx === currentLyricIdx) return;
  currentLyricIdx = idx;
  
  document.querySelectorAll('.imm-lyric-line').forEach((el,i) => el.classList.toggle('active', i===idx));
  if (idx >= 0 && lyricsOpen) {
    document.getElementById(`imm-lyric-${idx}`)?.scrollIntoView({ behavior:'smooth', block:'center' });
  }
}

function toggleLyrics() {
  lyricsOpen = !lyricsOpen;
  document.getElementById('immersive-view').classList.toggle('hidden', !lyricsOpen);
  document.getElementById('lyrics-btn').classList.toggle('active', lyricsOpen);
  if (lyricsOpen && currentSong()) {
    loadLyrics(currentSong());
    setTimeout(() => {
      if (currentLyricIdx >= 0) {
        document.getElementById(`imm-lyric-${currentLyricIdx}`)?.scrollIntoView({ block:'center' });
      }
    }, 100);
  }
}

// ── COLOR EXTRACTION ───────────────────────────────────────────────────────
function extractColor(img) {
  try {
    const c = document.createElement('canvas');
    c.width = c.height = 40;
    const ctx = c.getContext('2d');
    ctx.drawImage(img, 0, 0, 40, 40);
    const d = ctx.getImageData(0, 0, 40, 40).data;
    let r=0,g=0,b=0,n=0;
    for (let i=0;i<d.length;i+=12){r+=d[i];g+=d[i+1];b+=d[i+2];n++;}
    r=Math.round(r/n*1.3); g=Math.round(g/n*1.3); b=Math.round(b/n*1.3);
    r=Math.min(255,r); g=Math.min(255,g); b=Math.min(255,b);
    document.getElementById('bg-blob').style.background =
      `radial-gradient(circle, rgba(${r},${g},${b},0.18), transparent 70%)`;
  } catch(e) {}
}

// ── UTILS ──────────────────────────────────────────────────────────────────
function fmt(s) {
  if (!s||isNaN(s)) return '0:00';
  const m=Math.floor(s/60), sec=Math.floor(s%60);
  return `${m}:${sec.toString().padStart(2,'0')}`;
}
function esc(str) {
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── KEYBOARD CONTROLS ──────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName==='INPUT') return;
  if (e.code==='Space'){e.preventDefault();togglePlay();}
  if (e.code==='ArrowRight'&&e.shiftKey) skip(15);
  else if (e.code==='ArrowLeft'&&e.shiftKey) skip(-15);
  else if (e.code==='ArrowRight') nextSong();
  else if (e.code==='ArrowLeft') prevSong();
  else if (e.code==='Escape'&&lyricsOpen) toggleLyrics();
});

// INITIALIZATION
renderSidebarPlaylists();
audio.volume = 0.8;
</script>
